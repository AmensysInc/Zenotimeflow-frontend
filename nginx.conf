# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name zenotimeflow.com www.zenotimeflow.com;

    return 301 https://$host$request_uri;
}

# HTTPS server
server {
    listen 443 ssl;
    server_name zenotimeflow.com www.zenotimeflow.com;

    ssl_certificate /etc/letsencrypt/live/zenotimeflow.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zenotimeflow.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # API proxy to backend
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django media
    location /media/ {
        proxy_pass http://backend:8000/media/;
        proxy_set_header Host $host;
    }

    # Django static
    location /static/ {
        proxy_pass http://backend:8000/static/;
        proxy_set_header Host $host;
    }

    # Clock app (React Native web build)
    location = /clock {
        return 301 /clock/;
    }
    location /clock/ {
        alias /app/clock/;
        try_files $uri $uri/ /app/clock/index.html;
    }

    # React / SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
